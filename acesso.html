<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Protocolo 90S — Acesso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #000;
      color: #D4AF37;
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 320px;
      gap: 18px;
      text-align: center;
    }
    .linha-superior {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      color: #D4AF37;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 1px;
      margin: 0;
      line-height: 1.4;
    }
    .btn-codigo {
      width: 100%;
      padding: 14px;
      background: #000;
      color: rgba(255,255,255,0.45);
      font-weight: bold;
      font-size: 16px;
      border: 2px solid #D4AF37;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-codigo:hover {
      background: #D4AF37;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="linha-superior">⚡ Protocolo 90S</div>
    <h1>INSIRA SEU CÓDIGO<br>ANTI-VAZAMENTO</h1>
    <button class="btn-codigo" onclick="verificar()">Desbloquear Acesso</button>
  </div>
  <script>
    function verificar() {
      const senhaCorreta = "protocolo90s@2026";
      const senhaDigitada = prompt("Digite seu código de acesso:");
      if (senhaDigitada === senhaCorreta) {
        sessionStorage.setItem("bump_acesso", "ok");
        window.location.href = "index.html"; // APONTA PRO INDEX
      } else {
        alert("Código inválido. Verifique seu e-mail de compra.");
      }
    }
  </script>
</body>
</html>
